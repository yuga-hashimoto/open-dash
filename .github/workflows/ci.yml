name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # P14.1/P16.1: llama.cpp + whisper.cpp submodules feed
          # app/src/main/cpp/CMakeLists.txt, which externalNativeBuild now
          # compiles (see app/build.gradle.kts) — NDK 28.2.13676358 is
          # pre-installed on this runner image, no extra provisioning step
          # needed.
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          # LiteRT-LM's Engine classes are compiled for Java 21. Keeping the
          # CI runtime on 17 makes MockK fail while transforming
          # EmbeddedLlmProvider during unit tests.
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
